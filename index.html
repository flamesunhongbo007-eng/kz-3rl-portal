<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>哈萨克斯坦阿亚古孜—巴赫特宽轨铁路 · 项目综合信息门户</title>
    <style>
      /* 本地字体回退：macOS/Windows 系统自带中文字体 + 等宽字体 */
      :root {
        --font-sans: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "WenQuanYi Micro Hei", sans-serif;
        --font-mono: ui-monospace, "SF Mono", "Cascadia Code", "Consolas", "Menlo", monospace;
      }
      body {
        font-family: var(--font-sans);
        background: #080D18;
        color: #fff;
        margin: 0;
      }
      /* 加载动画 - 避免白屏期间用户觉得网站没在加载 */
      .boot {
        position: fixed; inset: 0;
        display: flex; align-items: center; justify-content: center;
        background: #080D18;
        z-index: 9999;
        transition: opacity 0.4s;
      }
      .boot-dot {
        width: 8px; height: 8px;
        border-radius: 50%;
        background: #00D7A0;
        box-shadow: 0 0 16px #00D7A0;
        animation: boot-pulse 1.4s ease-in-out infinite;
      }
      @keyframes boot-pulse {
        0%, 100% { opacity: 0.3; transform: scale(0.8); }
        50% { opacity: 1; transform: scale(1.2); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div class="boot" id="boot">
      <div class="boot-dot"></div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // React 挂载后移除加载动画
      setTimeout(() => {
        const boot = document.getElementById('boot');
        if (boot) { boot.style.opacity = '0'; setTimeout(() => boot.remove(), 500); }
      }, 300);
    </script>
  </body>
</html>
